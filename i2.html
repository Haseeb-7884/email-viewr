<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HeavyMail</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f3f4f6;--surface:#ffffff;--s2:#f8f9fa;--s3:#e9ecef;--s4:#dee2e6;
  --sidebar:#1e2130;--sb2:#252a3e;--sb3:#2d3349;
  --sb-text:#c9d1e3;--sb-muted:#6b7896;--sb-active:rgba(79,142,247,.18);--sb-acc:#6b9cf4;
  --border:#e5e7eb;--border2:#d1d5db;
  --text:#111827;--t2:#374151;--t3:#6b7280;--t4:#9ca3af;
  --acc:#2563eb;--acc-l:#eff6ff;--acc-b:#bfdbfe;
  --red:#dc2626;--green:#16a34a;--amber:#d97706;
  --r:8px;--rs:6px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px;}

/* TOPBAR */
#topbar{display:flex;align-items:center;gap:10px;background:var(--sidebar);padding:0 16px;height:52px;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,.2);z-index:40;}
.logo{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:700;color:#fff;letter-spacing:-.4px;white-space:nowrap;flex-shrink:0;}
.logo-badge{width:30px;height:30px;border-radius:8px;background:var(--acc);display:flex;align-items:center;justify-content:center;}
.logo-badge svg{width:16px;height:16px;fill:#fff;}
.tb-div{width:1px;height:22px;background:rgba(255,255,255,.1);flex-shrink:0;}
#search-box{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);border-radius:var(--r);padding:6px 12px;flex:1;max-width:380px;transition:background .15s,border-color .15s;}
#search-box:focus-within{background:rgba(255,255,255,.16);border-color:rgba(107,156,244,.5);}
#search-box svg{width:14px;height:14px;fill:#6b7896;flex-shrink:0;}
#si{background:transparent;border:none;outline:none;color:#e8edf5;font-size:12.5px;font-family:'Inter',sans-serif;width:100%;}
#si::placeholder{color:#4d5878;}
#add-btn{display:flex;align-items:center;gap:6px;padding:7px 15px;background:var(--acc);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:12.5px;font-weight:600;font-family:'Inter',sans-serif;white-space:nowrap;flex-shrink:0;transition:background .15s;}
#add-btn:hover{background:#1d4ed8;}
#add-btn:disabled{opacity:.4;cursor:not-allowed;}
#add-btn svg{width:13px;height:13px;fill:#fff;}
#tb-stats{font-size:11px;font-family:'JetBrains Mono',monospace;color:#4d5878;margin-left:auto;white-space:nowrap;flex-shrink:0;}
#file-input{display:none;}

/* LOADING OVERLAY */
#load-overlay{display:none;position:fixed;inset:0;background:rgba(17,24,39,.6);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
#load-overlay.show{display:flex;}
.load-card{background:#fff;border-radius:16px;padding:32px 40px;text-align:center;min-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.load-spinner{width:40px;height:40px;border:3px solid var(--acc-b);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;}
.load-sub{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--t3);margin-bottom:16px;min-height:16px;}
.load-track{background:var(--s3);border-radius:99px;height:5px;overflow:hidden;}
.load-fill{height:100%;background:var(--acc);width:0%;transition:width .25s;border-radius:99px;}
.load-note{font-size:11px;color:var(--t4);margin-top:10px;}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:220px;flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid rgba(0,0,0,.15);}
#sidebar::-webkit-scrollbar{width:3px;}
#sidebar::-webkit-scrollbar-thumb{background:var(--sb3);}
.sb-hdr{font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--sb-muted);padding:14px 14px 6px;}
.sb-row{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;color:var(--sb-muted);font-size:12.5px;border-left:3px solid transparent;transition:background .1s,color .1s;user-select:none;}
.sb-row:hover{background:rgba(255,255,255,.05);color:var(--sb-text);}
.sb-row.active{background:var(--sb-active);color:var(--sb-acc);border-left-color:var(--sb-acc);}
.sb-row svg{width:14px;height:14px;fill:currentColor;flex-shrink:0;}
.sb-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-ct{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--sb-muted);flex-shrink:0;}
.sb-row.active .sb-ct{color:var(--sb-acc);}
.acct-block{border-bottom:1px solid rgba(255,255,255,.05);}
.acct-head{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;user-select:none;transition:background .1s;}
.acct-head:hover{background:rgba(255,255,255,.05);}
.acct-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.acct-name{flex:1;font-size:12.5px;font-weight:600;color:var(--sb-text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.acct-sub{font-size:10px;color:var(--sb-muted);font-family:'JetBrains Mono',monospace;}
.acct-del{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s;flex-shrink:0;}
.acct-head:hover .acct-del{opacity:1;}
.acct-del:hover{background:rgba(220,38,38,.3);}
.acct-del svg{width:11px;height:11px;fill:#f87171;}
.acct-folders{padding:2px 0 6px;}
.fi{display:flex;align-items:center;gap:8px;padding:5px 14px 5px 28px;cursor:pointer;color:#4d5878;font-size:11.5px;border-left:3px solid transparent;transition:background .1s,color .1s;}
.fi:hover{background:rgba(255,255,255,.04);color:var(--sb-text);}
.fi.active{background:var(--sb-active);color:var(--sb-acc);border-left-color:var(--sb-acc);}
.fi svg{width:12px;height:12px;fill:currentColor;flex-shrink:0;}
.fi .sb-ct{font-size:10px;}
.sb-div{height:1px;background:rgba(255,255,255,.06);margin:4px 0;}

/* EMAIL LIST */
#lp{width:300px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);}
#lh{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface);}
#lh-title{font-size:14px;font-weight:700;color:var(--text);}
#lh-ct{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--t4);background:var(--s2);border:1px solid var(--border);padding:2px 8px;border-radius:99px;}
#list-wrap{flex:1;overflow-y:auto;position:relative;background:var(--surface);}
#list-wrap::-webkit-scrollbar{width:4px;}
#list-wrap::-webkit-scrollbar-thumb{background:var(--s3);}
#v-space{pointer-events:none;}
#v-rows{position:absolute;top:0;left:0;right:0;}
.er{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;border-left:3px solid transparent;transition:background .08s;}
.er:hover{background:#f9fafb;}
.er.sel{background:var(--acc-l);border-left-color:var(--acc);}
.er-head{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:3px;}
.er-from{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;line-height:1.3;}
.er-date{font-size:10.5px;color:var(--t4);white-space:nowrap;font-family:'JetBrains Mono',monospace;flex-shrink:0;margin-top:1px;}
.er-subj{font-size:12px;font-weight:500;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px;}
.er-prev{font-size:11.5px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.er-tags{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap;}
.tag{font-size:9.5px;font-weight:600;padding:1px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;}
.tag-html{background:#f3f0ff;color:#7c3aed;border:1px solid #ddd6fe;}
.tag-att{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;}
.tag-acct{font-size:9px;}
.list-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px 20px;text-align:center;}
.list-empty svg{width:36px;height:36px;fill:var(--t4);}
.list-empty .em-title{font-size:13px;font-weight:600;color:var(--t2);}
.list-empty .em-sub{font-size:11.5px;color:var(--t3);line-height:1.6;}
.etags{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
.etag{background:var(--acc-l);color:var(--acc);font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;border:1px solid var(--acc-b);}

/* DETAIL PANEL */
#dp{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;min-width:0;}

/* Email header - Gmail style */
#email-header{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);padding:20px 24px 16px;}
#email-subject{font-size:20px;font-weight:700;color:var(--text);margin-bottom:14px;line-height:1.35;letter-spacing:-.3px;}
.sender-row{display:flex;align-items:flex-start;gap:12px;}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px;}
.sender-info{flex:1;min-width:0;}
.sender-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.3;}
.sender-email{font-size:12px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:1px;}
.email-date{font-size:11.5px;color:var(--t3);white-space:nowrap;flex-shrink:0;margin-top:3px;}
.to-row{font-size:12px;color:var(--t3);margin-top:6px;margin-left:52px;}
.to-row span{color:var(--t2);}
.detail-expand{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--t3);cursor:pointer;margin-top:8px;margin-left:52px;width:fit-content;padding:2px 0;border-bottom:1px dashed var(--border2);}
.detail-expand svg{width:11px;height:11px;fill:currentColor;transition:transform .18s;}
.detail-expand.open svg{transform:rotate(180deg);}
.detail-meta{display:none;margin-top:10px;margin-left:52px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;}
.detail-meta.open{display:block;}
.dm-row{display:flex;gap:8px;font-size:12px;margin-bottom:4px;}
.dm-row:last-child{margin-bottom:0;}
.dm-k{font-weight:600;color:var(--t3);min-width:64px;flex-shrink:0;}
.dm-v{color:var(--t2);word-break:break-word;flex:1;}
.dm-v .em-addr{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);}

/* VIEW TOOLBAR */
#view-bar{display:flex;align-items:center;gap:6px;padding:8px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.vbtn{display:flex;align-items:center;gap:5px;padding:5px 12px;font-size:11.5px;font-weight:500;border-radius:var(--rs);cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--t3);font-family:'Inter',sans-serif;transition:all .12s;}
.vbtn:hover{background:var(--s2);color:var(--text);}
.vbtn.on{background:var(--acc-l);color:var(--acc);border-color:var(--acc-b);font-weight:600;}
.vbtn svg{width:12px;height:12px;fill:currentColor;}

/* EMAIL BODY */
#email-body{flex:1;overflow-y:auto;padding:20px 24px 28px;background:var(--bg);}
#email-body::-webkit-scrollbar{width:5px;}
#email-body::-webkit-scrollbar-thumb{background:var(--s4);}
#html-frame{background:#fff;border-radius:var(--r);border:1px solid var(--border);overflow:hidden;}
#html-frame iframe{width:100%;border:none;display:block;}
#plain-body{font-size:13px;line-height:1.8;color:var(--t2);white-space:pre-wrap;word-break:break-word;font-family:'JetBrains Mono',monospace;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;}

/* ATTACHMENTS */
#att-section{margin-top:16px;}
.att-label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--t3);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.att-label svg{width:13px;height:13px;fill:var(--t3);}
#att-list{display:flex;flex-wrap:wrap;gap:8px;}
.att-pill{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:border-color .12s,box-shadow .12s;max-width:240px;}
.att-pill:hover{border-color:var(--acc-b);box-shadow:0 2px 8px rgba(37,99,235,.1);}
.att-icon{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.att-name{font-size:11.5px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
.att-size{font-size:10px;color:var(--t4);font-family:'JetBrains Mono',monospace;}
.att-dl svg{width:12px;height:12px;fill:var(--acc);}

/* EMPTY / WELCOME */
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;padding:40px;text-align:center;}
.detail-empty svg{width:52px;height:52px;fill:var(--t4);}
.detail-empty h3{font-size:16px;font-weight:700;color:var(--t2);}
.detail-empty p{font-size:12.5px;color:var(--t3);max-width:240px;line-height:1.7;}

/* TOAST */
#toast{position:fixed;bottom:18px;right:18px;z-index:9999;background:#1e2130;color:#c9d1e3;padding:10px 16px;border-radius:var(--r);font-size:12.5px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.25);opacity:0;transform:translateY(6px);pointer-events:none;transition:opacity .2s,transform .2s;border-left:3px solid var(--acc);max-width:300px;}
#toast.show{opacity:1;transform:translateY(0);}
#toast.warn{border-left-color:var(--amber);}
#toast.err{border-left-color:var(--red);}

/* DROP OVERLAY */
#drop-ov{display:none;position:fixed;inset:0;background:rgba(243,244,246,.92);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
#drop-ov.show{display:flex;}
.drop-box{border:2px dashed var(--acc);border-radius:18px;padding:52px 80px;text-align:center;background:#fff;}
.drop-box svg{width:44px;height:44px;fill:var(--acc);margin-bottom:12px;}
.drop-box h2{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px;}
.drop-box p{font-size:13px;color:var(--t3);}
</style>
</head>
<body>

<div id="drop-ov">
  <div class="drop-box">
    <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
    <h2>Drop your mail folder</h2>
    <p>.eml · .mbox · .emlx · maildir</p>
  </div>
</div>

<div id="load-overlay">
  <div class="load-card">
    <div class="load-spinner"></div>
    <div class="load-title" id="lo-title">Reading files…</div>
    <div class="load-sub" id="lo-sub">Preparing…</div>
    <div class="load-track"><div class="load-fill" id="lo-fill"></div></div>
    <div class="load-note">Large archives may take a minute. Please keep this tab open.</div>
  </div>
</div>

<div id="topbar">
  <div class="logo">
    <div class="logo-badge">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
    </div>
    HeavyMail
  </div>
  <div class="tb-div"></div>
  <div id="search-box">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <input id="si" type="text" placeholder="Search emails…" oninput="onSearch()"/>
  </div>
  <div id="tb-stats">No data</div>
  <button id="add-btn" onclick="triggerUpload()">
    <svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:#fff;margin-right:4px"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    Add Account
  </button>
  <input type="file" id="file-input" webkitdirectory multiple/>
</div>

<div id="main">
  <div id="sidebar">
    <div style="padding:8px 0;">
      <div class="sb-row active" id="sb-all" onclick="selectScope({type:'global'})">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        <span class="sb-label">All Mail</span>
        <span class="sb-ct" id="sb-all-ct">0</span>
      </div>
    </div>
    <div class="sb-div"></div>
    <div id="acct-groups"></div>
  </div>

  <div id="lp">
    <div id="lh">
      <span id="lh-title">All Mail</span>
      <span id="lh-ct">0 emails</span>
    </div>
    <div id="list-wrap" onscroll="onVScroll()">
      <div id="v-space"></div>
      <div id="v-rows"></div>
    </div>
  </div>

  <div id="dp">
    <div id="email-body" style="padding:0">
      <div class="detail-empty">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        <h3>Select an email</h3>
        <p>Click any email in the list to read it</p>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';
// ═══════════════════════════════════
// CONFIG
// ═══════════════════════════════════
const MAX_ACCTS   = 5;
const FILE_MAX_MB = 150;
const BATCH       = 25;
const ROW_H       = 72;
const DB_NAME     = 'heavymail2';
const DB_VER      = 1;
const COLORS      = ['#2563eb','#16a34a','#d97706','#7c3aed','#db2777'];
const SKIP_EXT    = /\.(jpg|jpeg|png|gif|bmp|webp|zip|gz|tar|rar|7z|exe|dll|db|sqlite|bin|ico|woff|woff2|ttf|otf|mp3|mp4|avi|mov|mkv|pst|ost|nsf|tbb|pdf)$/i;

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let idb           = null;
let accounts      = [];
let scope         = {type:'global'};
let listRows      = [];   // lightweight row objects
let selKey        = null;
let curEmail      = null;
let viewMode      = 'html';
let searchQ       = '';
let loading       = false;
let vsOff         = 0;
let _tt;

// ═══════════════════════════════════
// INDEXEDDB
// ═══════════════════════════════════
function openDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e=>{
      const d = e.target.result;
      if(!d.objectStoreNames.contains('mails')){
        const s = d.createObjectStore('mails',{keyPath:'_k',autoIncrement:true});
        s.createIndex('ai','acctId');
        s.createIndex('fa',['folder','acctId']);
      }
      if(!d.objectStoreNames.contains('cfg')) d.createObjectStore('cfg',{keyPath:'k'});
    };
    r.onsuccess = e=>{ idb=e.target.result; res(); };
    r.onerror   = e=>rej(e.target.error);
  });
}
function tx(stores,mode){ return idb.transaction(stores,mode); }
function dbGet(store,key){ return new Promise((res,rej)=>{ const r=tx(store,'readonly').objectStore(store).get(key); r.onsuccess=()=>res(r.result); r.onerror=e=>rej(e); }); }
function dbPut(store,obj){ return new Promise((res,rej)=>{ const r=tx(store,'readwrite').objectStore(store).put(obj); r.onsuccess=()=>res(); r.onerror=e=>rej(e); }); }

function dbInsertBatch(recs){
  return new Promise((res,rej)=>{
    const t = tx('mails','readwrite');
    const s = t.objectStore('mails');
    let i=0;
    function next(){
      if(i>=recs.length) return;
      const r=s.add(recs[i++]);
      r.onsuccess=next; r.onerror=next;
    }
    for(let p=0;p<Math.min(6,recs.length);p++) next();
    t.oncomplete=()=>res();
    t.onerror=e=>rej(e);
  });
}

function dbCursor(acctId,folder,cb){
  return new Promise((res,rej)=>{
    const t  = tx('mails','readonly');
    const s  = t.objectStore('mails');
    const rq = !acctId ? s.openCursor()
             : folder  ? s.index('fa').openCursor(IDBKeyRange.only([folder,acctId]))
             : s.index('ai').openCursor(IDBKeyRange.only(acctId));
    rq.onsuccess = e=>{ const c=e.target.result; if(!c){res();return;} cb(c.value); c.continue(); };
    rq.onerror   = e=>rej(e);
  });
}

function dbDeleteAcct(acctId){
  return new Promise((res,rej)=>{
    const t  = tx('mails','readwrite');
    const s  = t.objectStore('mails');
    const rq = s.index('ai').openCursor(IDBKeyRange.only(acctId));
    rq.onsuccess = e=>{ const c=e.target.result; if(!c){res();return;} c.delete(); c.continue(); };
    rq.onerror   = e=>rej(e);
    t.oncomplete = ()=>res();
  });
}

async function saveCfg(){ await dbPut('cfg',{k:'accounts',v:accounts}); }
async function loadCfg(){ const r=await dbGet('cfg','accounts'); if(r) accounts=r.v||[]; }

// PARSING UTILS
// ═══════════════════════════════════
function dQP(s){ return s.replace(/=\r?\n/g,'').replace(/=([0-9A-Fa-f]{2})/g,(_,h)=>String.fromCharCode(parseInt(h,16))); }
function dB64s(s){ const c=s.replace(/\s+/g,''); try{ const b=atob(c); try{ return decodeURIComponent(escape(b)); }catch{ return b; } }catch{ return ''; } }
function dB64b(s){ const c=s.replace(/\s+/g,''); try{ const b=atob(c),a=new Uint8Array(b.length); for(let i=0;i<b.length;i++) a[i]=b.charCodeAt(i); return a; }catch{ return new Uint8Array(0); } }
function d2047(s){ if(!s) return ''; return s.replace(/=\?([^?]+)\?([BbQq])\?([^?]*)\?=/g,(_,cs,enc,d)=>{ try{ if(enc.toUpperCase()==='B'){ const b=atob(d.replace(/\s/g,'')); if(/utf-?8/i.test(cs)){ try{ return decodeURIComponent(escape(b)); }catch{} } return b; } const q=d.replace(/_/g,' ').replace(/=([0-9A-Fa-f]{2})/g,(_,h)=>String.fromCharCode(parseInt(h,16))); if(/utf-?8/i.test(cs)){ try{ return decodeURIComponent(escape(q)); }catch{} } return q; }catch{} return d; }); }
function strip(s){ return s.replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'').replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'').replace(/<br\s*\/?>/gi,'\n').replace(/<\/(?:p|div|tr|li|h[1-6])>/gi,'\n').replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/[ \t]+/g,' ').replace(/\n{3,}/g,'\n\n').trim(); }
function xName(f){ if(!f) return 'Unknown'; const m=f.match(/^"?([^"<]+?)"?\s*</); if(m) return m[1].trim(); const m2=f.match(/([^\s<>,]+@[^\s<>,>]+)/); if(m2) return m2[1]; return f.trim().slice(0,40)||'Unknown'; }
function xEmail(f){ const m=(f||'').match(/<([^>]+)>/); if(m) return m[1]; const m2=(f||'').match(/([^\s<>,]+@[^\s<>,>]+)/); if(m2) return m2[1]; return ''; }
function fmtD(d){ if(!d) return ''; try{ const dt=new Date(d); if(isNaN(dt)) return d.slice(0,10); const n=new Date(); if(dt.toDateString()===n.toDateString()) return dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); if(dt.getFullYear()===n.getFullYear()) return dt.toLocaleDateString([],{month:'short',day:'numeric'}); return dt.toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}); }catch{ return d.slice(0,10); } }
function fmtDFull(d){ if(!d) return '—'; try{ const dt=new Date(d); if(isNaN(dt)) return d; return dt.toLocaleString([],{weekday:'short',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }catch{ return d; } }
function fmtSz(b){ if(!b||b<=0) return ''; if(b<1024) return b+'B'; if(b<1048576) return (b/1024).toFixed(1)+'KB'; return (b/1048576).toFixed(1)+'MB'; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function yld(){ return new Promise(r=>setTimeout(r,0)); }

function normF(raw){ const n=(raw||'').toLowerCase().trim(); if(['cur','new','tmp'].includes(n)) return 'Inbox'; if(n.includes('inbox')) return 'Inbox'; if(n.includes('sent')) return 'Sent'; if(n.includes('spam')||n.includes('junk')) return 'Spam'; if(n.includes('trash')||n.includes('delet')) return 'Trash'; if(n.includes('archive')) return 'Archive'; if(n.includes('draft')) return 'Drafts'; if(!raw||!raw.trim()) return 'Inbox'; return raw.charAt(0).toUpperCase()+raw.slice(1); }
function folderOf(file){ const rel=(file.webkitRelativePath||file.name).replace(/\\/g,'/'); const p=rel.split('/'); if(p.length>=3){ const lf=p[p.length-2].toLowerCase(); if(['cur','new','tmp'].includes(lf)&&p.length>=4) return normF(p[p.length-3]); return normF(p[p.length-2]); } if(p.length===2) return normF(p[0]); return 'Inbox'; }

function hdrParse(raw){ const hdrs={}; let i=0; if(raw.startsWith('From ')){ const nl=raw.indexOf('\n'); i=nl<0?raw.length:nl+1; } while(i<raw.length){ const ch=raw[i]; if(ch==='\r'&&raw[i+1]==='\n'){i+=2;break;} if(ch==='\n'){i++;break;} let le=i; while(le<raw.length){ const nl=raw.indexOf('\n',le); if(nl<0){le=raw.length;break;} le=nl+1; if(le<raw.length&&(raw[le]===' '||raw[le]==='\t')) continue; break; } const line=raw.slice(i,le).replace(/\r?\n[ \t]+/g,' ').replace(/\r?\n$/,''); i=le; const co=line.indexOf(':'); if(co<1) continue; const k=line.slice(0,co).toLowerCase().trim(); const v=line.slice(co+1).trim(); if(k==='received'){if(!hdrs._rcv) hdrs._rcv=[]; hdrs._rcv.push(v);}else if(!hdrs[k]) hdrs[k]=v; } return {hdrs,bo:i}; }
function mpar(hv,pn){ if(!hv) return null; const re=new RegExp(pn+'\\*?(?:\\d+)?\\*?\\s*=\\s*(?:utf-8\'\')?(?:"([^"]*)"|([^;\\s]+))','gi'); let r=null,m; while((m=re.exec(hv))!==null){ const v=(m[1]!==undefined?m[1]:m[2]||'').trim(); if(v) r=(r||'')+v; } if(r){try{r=decodeURIComponent(r);}catch{}} return r; }

function splitMP(body,boundary){ const del='--'+boundary,term='--'+boundary+'--'; const parts=[]; let pos=0,len=body.length; while(pos<len){ const idx=body.indexOf(del,pos); if(idx<0) break; if(idx>0&&body[idx-1]!=='\n'&&body[idx-1]!=='\r'){pos=idx+del.length;continue;} const le=body.indexOf('\n',idx); if(le<0){pos=len;break;} pos=le+1; const dl=body.slice(idx,le).trim(); if(dl===term||dl.startsWith(term)) break; let nx=body.indexOf(del,pos); while(nx>0&&body[nx-1]!=='\n'&&body[nx-1]!=='\r') nx=body.indexOf(del,nx+1); if(nx<0){parts.push(body.slice(pos));break;} let pe=nx; if(body[pe-1]==='\n') pe--; if(body[pe-1]==='\r') pe--; parts.push(body.slice(pos,pe)); pos=nx; } return parts; }

function walkMime(raw){ const{hdrs,bo}=hdrParse(raw); const body=raw.slice(bo); const ct=hdrs['content-type']||'text/plain'; const cte=(hdrs['content-transfer-encoding']||'').toLowerCase().trim(); const cd=hdrs['content-disposition']||''; const mime=ct.split(';')[0].toLowerCase().trim(); const bnd=mpar(ct,'boundary'); const fn=mpar(cd,'filename')||mpar(cd,'name')||mpar(ct,'name')||null; const isAtt=/^attachment/i.test(cd.trim())||(!!fn&&!/^inline/i.test(cd.trim())); if(mime.startsWith('multipart/')&&bnd){ const r={text:'',html:'',atts:[]}; for(const p of splitMP(body,bnd)){ if(!p.trim()) continue; const s=walkMime(p); if(!r.html&&s.html) r.html=s.html; if(!r.text&&s.text) r.text=s.text; r.atts.push(...s.atts); } return r; } let dec=body; if(cte==='quoted-printable') dec=dQP(body); else if(cte==='base64'){ const b=body.replace(/\s+/g,''); if(isAtt||!mime.startsWith('text/')) return{text:'',html:'',atts:[{name:fn||'attachment',mime,data:b,enc:'base64',size:Math.floor(b.length*.75)}]}; dec=dB64s(b); } if(isAtt&&fn) return{text:'',html:'',atts:[{name:fn,mime,data:dec,enc:cte,size:dec.length}]}; if(mime==='text/html') return{text:'',html:dec,atts:[]}; return{text:dec,html:'',atts:[]}; }

function parseEml(raw,folder,acctId){ if(!raw||raw.length<15) return null; const{hdrs}=hdrParse(raw); const from=d2047(hdrs['from']||''); const to=d2047(hdrs['to']||''); const cc=d2047(hdrs['cc']||''); const rt=d2047(hdrs['reply-to']||''); const subj=d2047(hdrs['subject']||'(No subject)'); const date=hdrs['date']||hdrs['delivery-date']||''; const mid=hdrs['message-id']||''; if(!from&&!to&&!date&&subj==='(No subject)') return null; const w=walkMime(raw); let html=w.html||'',text=w.text||''; if(!html&&!text){ const{hdrs:h2,bo}=hdrParse(raw); const rb=raw.slice(bo); const cte2=(h2['content-transfer-encoding']||'').toLowerCase().trim(); const ct2=h2['content-type']||'text/plain'; let dec=rb; if(cte2==='quoted-printable') dec=dQP(rb); else if(cte2==='base64') dec=dB64s(rb.replace(/\s+/g,'')); if(ct2.toLowerCase().includes('html')) html=dec; else text=dec; } let pt=(text||'').trim(); if(!pt&&html) pt=strip(html); if(pt.length>30000) pt=pt.slice(0,30000)+'\n…[truncated]'; return{from,to,cc,replyTo:rt,subject:subj,date,msgId:mid,folder,acctId,html:html.trim(),text:pt,preview:pt.replace(/\s+/g,' ').slice(0,120),atts:w.atts||[],hasHtml:!!html.trim(),hasAtts:(w.atts||[]).length>0}; }

function splitMbox(t){ const msgs=[],ix=[]; if(t.startsWith('From ')) ix.push(0); let p=t.indexOf('\nFrom '); while(p>=0){ix.push(p+1);p=t.indexOf('\nFrom ',p+1);} for(let i=0;i<ix.length;i++) msgs.push(t.slice(ix[i],i+1<ix.length?ix[i+1]:t.length)); return msgs; }
function isEml(t){ return /^(From|To|Subject|Date|MIME-Version|Content-Type|Message-ID|Return-Path|Received)\s*:/im.test(t.slice(0,3000)); }
function isMbox(t){ return t.startsWith('From ')&&(t.includes('\nFrom ')||t.length>2000); }

function parseFile(text,filename,folder,acctId){ const out=[]; if(!text||text.length<10) return out; const tr=text.trimStart(); if(isMbox(tr)){ const msgs=splitMbox(tr); for(const m of msgs){ try{ const e=parseEml(m,folder,acctId); if(e) out.push(e); }catch{} } if(out.length) return out; } if(isEml(tr)){ try{ const e=parseEml(tr,folder,acctId); if(e){out.push(e);return out;} }catch{} } if(/\.emlx$/i.test(filename)){ const nl=text.indexOf('\n'); if(nl>0){ const inner=text.slice(nl+1); if(isEml(inner)){ try{ const e=parseEml(inner,folder,acctId); if(e){out.push(e);return out;} }catch{} } } } return out; }

function readTxt(file){ return new Promise(res=>{ const r=new FileReader(); r.onload=e=>{ const t=e.target.result; if(t&&!t.includes('\uFFFD')){res(t);return;} const r2=new FileReader(); r2.onload=e2=>res(e2.target.result||''); r2.onerror=()=>res(''); r2.readAsText(file,'iso-8859-1'); }; r.onerror=()=>{ const r2=new FileReader(); r2.onload=e2=>res(e2.target.result||''); r2.onerror=()=>res(''); r2.readAsText(file,'iso-8859-1'); }; r.readAsText(file,'utf-8'); }); }

function triggerUpload(){ if(loading) return; if(accounts.length>=MAX_ACCTS){toast('Max '+MAX_ACCTS+' accounts. Remove one first.','warn');return;} document.getElementById('file-input').click(); }
document.getElementById('file-input').addEventListener('change',async ev=>{ const files=Array.from(ev.target.files); ev.target.value=''; if(files.length) await loadAccount(files); });

async function loadAccount(files){
  if(loading||accounts.length>=MAX_ACCTS) return;
  loading=true;

  const valid=files.filter(f=>{ const nm=f.name.toLowerCase(); if(SKIP_EXT.test(nm)) return false; if(f.size===0||f.size>FILE_MAX_MB*1024*1024) return false; return true; });
  if(!valid.length){loading=false;toast('No supported files found.','warn');return;}

  const acctId='a'+Date.now();
  const ci=accounts.length;
  const color=COLORS[ci%COLORS.length];
  const root=((files[0]?.webkitRelativePath||files[0]?.name||'').split('/')[0]||'Account '+(ci+1)).slice(0,28);

  // Show overlay immediately
  const ov=document.getElementById('load-overlay');
  const lt=document.getElementById('lo-title');
  const ls=document.getElementById('lo-sub');
  const lf=document.getElementById('lo-fill');
  ov.classList.add('show');
  lt.textContent=`Importing "${root}"`;
  ls.textContent=`0 / ${valid.length.toLocaleString()} files scanned`;
  lf.style.width='0%';
  document.getElementById('add-btn').disabled=true;
  await yld();

  let done=0,total=0;
  const folderMap={};
  let buf=[];

  async function flush(){
    if(!buf.length) return;
    await dbInsertBatch(buf);
    buf=[];
  }

  for(let b=0;b<valid.length;b+=BATCH){
    const chunk=valid.slice(b,b+BATCH);
    for(const f of chunk){
      try{
        const text=await readTxt(f);
        if(text&&text.trim().length>5){
          const folder=folderOf(f);
          for(const e of parseFile(text,f.name,folder,acctId)){
            folderMap[folder]=(folderMap[folder]||0)+1;
            buf.push(e); total++;
            if(buf.length>=300) await flush();
          }
        }
      }catch{}
      done++;
    }
    const pct=Math.round(done/valid.length*100);
    lf.style.width=pct+'%';
    ls.textContent=`${done.toLocaleString()} / ${valid.length.toLocaleString()} files · ${total.toLocaleString()} emails found`;
    await yld();
  }
  await flush();

  ov.classList.remove('show');
  loading=false;
  document.getElementById('add-btn').disabled=accounts.length>=MAX_ACCTS;

  if(!total){toast(`"${root}": no emails found.`,'warn');return;}

  accounts.push({id:acctId,name:root,color,count:total,folders:folderMap});
  await saveCfg();
  scope={type:'acct',acctId};
  buildSidebar(); await refreshList(); updateStats();
  toast(`"${root}" — ${total.toLocaleString()} emails loaded`);
}

async function removeAccount(id,ev){
  if(ev){ev.stopPropagation();ev.preventDefault();}
  const idx=accounts.findIndex(a=>a.id===id); if(idx===-1) return;
  const name=accounts[idx].name;
  await dbDeleteAcct(id);
  accounts.splice(idx,1);
  accounts.forEach((a,i)=>a.color=COLORS[i%COLORS.length]);
  await saveCfg();
  if(scope.acctId===id) scope=accounts.length?{type:'acct',acctId:accounts[0].id}:{type:'global'};
  selKey=null; curEmail=null;
  buildSidebar(); await refreshList(); clearDetail(); updateStats();
  document.getElementById('add-btn').disabled=accounts.length>=MAX_ACCTS;
  toast(`"${name}" removed`,'warn');
}

function buildSidebar(){
  const total=accounts.reduce((s,a)=>s+a.count,0);
  document.getElementById('sb-all-ct').textContent=total.toLocaleString();
  const sball=document.getElementById('sb-all');
  sball.className='sb-row'+(scope.type==='global'?' active':'');

  const wrap=document.getElementById('acct-groups');
  wrap.innerHTML='';
  const ORDER=['Inbox','Sent','Drafts','Archive','Spam','Trash'];

  for(const a of accounts){
    const isA=scope.acctId===a.id;
    const block=document.createElement('div');
    block.className='acct-block';

    const head=document.createElement('div');
    head.className='acct-head';
    head.innerHTML=`<span class="acct-dot" style="background:${a.color}"></span>
      <div style="flex:1;min-width:0"><div class="acct-name">${esc(a.name)}</div><div class="acct-sub">${a.count.toLocaleString()} emails</div></div>
      <span class="acct-del" onclick="removeAccount('${a.id}',event)" title="Remove account">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </span>`;
    head.onclick=()=>selectScope({type:'acct',acctId:a.id});
    block.appendChild(head);

    if(isA){
      const fd=document.createElement('div');
      fd.className='acct-folders';
      // All mail for this account
      const allRow=document.createElement('div');
      allRow.className='fi'+(scope.type==='acct'&&scope.acctId===a.id?' active':'');
      allRow.innerHTML=`<svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg><span style="flex:1">${esc(a.name)} — All</span><span class="sb-ct">${a.count.toLocaleString()}</span>`;
      allRow.onclick=e=>{e.stopPropagation();selectScope({type:'acct',acctId:a.id});};
      fd.appendChild(allRow);
      // Folder rows
      const fnames=[...ORDER.filter(o=>a.folders[o]),...Object.keys(a.folders).filter(k=>!ORDER.includes(k)).sort()];
      for(const fn of fnames){
        const fi=document.createElement('div');
        fi.className='fi'+(scope.type==='folder'&&scope.acctId===a.id&&scope.folder===fn?' active':'');
        fi.innerHTML=`<svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg><span style="flex:1">${esc(fn)}</span><span class="sb-ct">${(a.folders[fn]||0).toLocaleString()}</span>`;
        fi.onclick=e=>{e.stopPropagation();selectScope({type:'folder',acctId:a.id,folder:fn});};
        fd.appendChild(fi);
      }
      block.appendChild(fd);
    }
    wrap.appendChild(block);
  }
}

function updateStats(){
  const total=accounts.reduce((s,a)=>s+a.count,0);
  document.getElementById('tb-stats').textContent=accounts.length?`${total.toLocaleString()} emails · ${accounts.length} acct${accounts.length!==1?'s':''}` :'No data';
}

// ═══════════════════════════════════
// LIST LOADING (from IDB)
// ═══════════════════════════════════
async function selectScope(s){ scope=s; selKey=null; searchQ=''; document.getElementById('si').value=''; buildSidebar(); await refreshList(); clearDetail(); }

async function onSearch(){ searchQ=document.getElementById('si').value.trim(); await refreshList(); clearDetail(); }

async function refreshList(){
  const acctId=scope.type!=='global'?scope.acctId:null;
  const folder=scope.type==='folder'?scope.folder:null;
  const q=searchQ.toLowerCase();
  const rows=[];

  await dbCursor(acctId,folder,v=>{
    if(q){
      const hay=((v.from||'')+(v.subject||'')+(v.preview||'')).toLowerCase();
      if(!hay.includes(q)) return;
    }
    rows.push({_k:v._k,from:v.from,subject:v.subject,date:v.date,preview:v.preview,hasHtml:v.hasHtml,hasAtts:v.hasAtts,acctId:v.acctId,folder:v.folder});
  });

  rows.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  listRows=rows;

  const cnt=rows.length;
  const titles={global:'All Mail',acct:(accounts.find(a=>a.id===scope.acctId)||{}).name||'Account',folder:scope.folder};
  document.getElementById('lh-title').textContent=titles[scope.type]||'All Mail';
  document.getElementById('lh-ct').textContent=cnt.toLocaleString()+' email'+(cnt!==1?'s':'');

  vsOff=0;
  document.getElementById('v-space').style.height=(cnt*ROW_H)+'px';
  document.getElementById('list-wrap').scrollTop=0;
  drawRows();
}

// ═══════════════════════════════════
// VIRTUAL SCROLL
// ═══════════════════════════════════
function onVScroll(){ const lw=document.getElementById('list-wrap'); const no=Math.floor(lw.scrollTop/ROW_H); if(Math.abs(no-vsOff)>3){vsOff=no;drawRows();} }

function drawRows(){
  const lw=document.getElementById('list-wrap');
  const vh=lw.clientHeight||600;
  const vis=Math.ceil(vh/ROW_H)+8;
  const start=Math.max(0,vsOff-4);
  const end=Math.min(listRows.length,start+vis+4);
  const wrap=document.getElementById('v-rows');
  wrap.style.top=(start*ROW_H)+'px';

  if(!listRows.length){
    wrap.innerHTML=`<div class="list-empty">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      <div class="em-title">${accounts.length?'No emails found':'No accounts yet'}</div>
      <div class="em-sub">${accounts.length?'Try a different search or folder':'Click Add Account or drag &amp; drop a mail folder'}</div>
      ${!accounts.length?'<div class="etags"><span class="etag">.eml</span><span class="etag">.mbox</span><span class="etag">.emlx</span><span class="etag">maildir</span></div>':''}
    </div>`;
    return;
  }

  const frag=document.createDocumentFragment();
  for(let i=start;i<end;i++){
    const e=listRows[i];
    const acct=accounts.find(a=>a.id===e.acctId);
    const div=document.createElement('div');
    div.className='er'+(e._k===selKey?' sel':'');
    div.style.height=ROW_H+'px';
    const tags=[];
    if(e.hasHtml) tags.push('<span class="tag tag-html">HTML</span>');
    if(e.hasAtts) tags.push('<span class="tag tag-att">ATT</span>');
    if(scope.type==='global'&&acct) tags.push(`<span class="tag tag-acct" style="background:${acct.color}15;color:${acct.color};border:1px solid ${acct.color}30">${esc(acct.name)}</span>`);
    div.innerHTML=`<div class="er-head"><span class="er-from">${esc(xName(e.from))}</span><span class="er-date">${fmtD(e.date)}</span></div>
      <div class="er-subj">${esc(e.subject)}</div>
      <div class="er-prev">${esc((e.preview||'').slice(0,90))}</div>
      ${tags.length?`<div class="er-tags">${tags.join('')}</div>`:''}`;
    div.addEventListener('click',(function(key,row){return()=>openEmail(key,row);})(e._k,div));
    frag.appendChild(div);
  }
  wrap.innerHTML='';
  wrap.appendChild(frag);
}

// ═══════════════════════════════════
// EMAIL DETAIL — Gmail style
// ═══════════════════════════════════
async function openEmail(key,row){
  selKey=key;
  document.querySelectorAll('.er').forEach(r=>r.classList.remove('sel'));
  row.classList.add('sel');
  const e=await dbGet('mails',key);
  if(!e) return;
  curEmail=e;
  viewMode=e.hasHtml?'html':'text';
  renderDetail(e);
}

function avatarColor(name){
  const colors=['#2563eb','#7c3aed','#db2777','#16a34a','#d97706','#dc2626','#0891b2','#65a30d'];
  let h=0; for(const c of (name||'?')) h=(h<<5)-h+c.charCodeAt(0);
  return colors[Math.abs(h)%colors.length];
}

function fmtAddrInline(raw){
  if(!raw) return '<span style="color:var(--t4)">—</span>';
  const n=xName(raw),em=xEmail(raw);
  if(em&&n&&n!==em&&!n.includes('@')) return `${esc(n)} <span class="em-addr">&lt;${esc(em)}&gt;</span>`;
  return esc(raw);
}
function fmtAddrList(raw){
  if(!raw) return '—';
  const parts=[];let d=0,cur='';
  for(const ch of raw){if(ch==='<')d++;else if(ch==='>')d--;if(ch===','&&d===0){parts.push(cur.trim());cur='';}else cur+=ch;}
  if(cur.trim()) parts.push(cur.trim());
  return parts.map(p=>{ const n=xName(p),em=xEmail(p); return n&&em&&n!==em?`${esc(n)}`:`${esc(p)}`; }).join(', ');
}

function renderDetail(e){
  const acct=accounts.find(a=>a.id===e.acctId);
  const senderName=xName(e.from)||'Unknown';
  const senderEmail=xEmail(e.from)||e.from||'';
  const initials=senderName.split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase()||'?';
  const avColor=avatarColor(senderName);

  const toList=fmtAddrList(e.to);
  const folder=e.folder||(acct?acct.name:'');

  let attsHtml='';
  if(e.atts&&e.atts.length){
    const cards=e.atts.map((a,i)=>{
      const ico=attIcon(a.mime||'');
      return `<div class="att-pill" onclick="dlAtt(${i})">
        <div class="att-icon" style="background:${ico.bg}">${ico.svg}</div>
        <div style="flex:1;min-width:0"><div class="att-name">${esc(a.name||'attachment')}</div><div class="att-size">${esc((a.mime||'file').split('/').pop())}${a.size?' · '+fmtSz(a.size):''}</div></div>
        <div class="att-dl"><svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg></div>
      </div>`;
    }).join('');
    attsHtml=`<div id="att-section"><div class="att-label"><svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>${e.atts.length} attachment${e.atts.length>1?'s':''}</div><div id="att-list">${cards}</div></div>`;
  }

  const extraMeta=[];
  if(e.cc) extraMeta.push(['CC',e.cc]);
  if(e.replyTo&&e.replyTo!==e.from) extraMeta.push(['Reply-To',e.replyTo]);
  if(e.msgId) extraMeta.push(['Message-ID',e.msgId]);

  const bodyContent = viewMode==='html'&&e.hasHtml
    ? `<div id="html-frame"><iframe sandbox="allow-same-origin" frameborder="0" scrolling="auto"></iframe></div>`
    : `<div id="plain-body">${esc(e.text||'(No message body)')}</div>`;

  const htmlBtn=e.hasHtml?`<button class="vbtn${viewMode==='html'?' on':''}" onclick="setView('html')"><svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg> HTML</button>`:'';
  const txtBtn=`<button class="vbtn${viewMode==='text'?' on':''}" onclick="setView('text')"><svg viewBox="0 0 24 24"><path d="M2.5 4v3h5v12h3V7h5V4h-13zm19 5h-9v3h3v7h3v-7h3V9z"/></svg> Plain Text</button>`;

  document.getElementById('dp').innerHTML=`
    <div id="email-header">
      <div id="email-subject">${esc(e.subject)}</div>
      <div class="sender-row">
        <div class="avatar" style="background:${avColor}">${initials}</div>
        <div class="sender-info">
          <div class="sender-name">${esc(senderName)}${acct?` <span style="font-size:11px;font-weight:400;color:var(--t3)">via ${esc(acct.name)}</span>`:''}</div>
          <div class="sender-email">${esc(senderEmail)}</div>
        </div>
        <div class="email-date">${fmtDFull(e.date)}</div>
      </div>
      <div class="to-row">To: <span>${esc(toList)}</span>${folder?` &nbsp;·&nbsp; <span style="color:var(--acc);font-weight:500">${esc(folder)}</span>`:''}</div>
      ${extraMeta.length?`<div class="detail-expand" onclick="toggleMeta(this)"><svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg> More details</div>
      <div class="detail-meta">${extraMeta.map(([k,v])=>`<div class="dm-row"><span class="dm-k">${k}</span><span class="dm-v">${esc(v)}</span></div>`).join('')}</div>`:''}
    </div>
    <div id="view-bar">${htmlBtn}${txtBtn}</div>
    <div id="email-body">${bodyContent}${attsHtml}</div>`;

  if(viewMode==='html'&&e.hasHtml){
    requestAnimationFrame(()=>{
      const iframe=document.querySelector('#html-frame iframe');
      if(!iframe) return;
      try{
        const doc=iframe.contentDocument||iframe.contentWindow.document;
        doc.open();
        doc.write(`<!DOCTYPE html><html><head><meta charset="utf-8"/><style>
          *{box-sizing:border-box;}html,body{margin:0;padding:0;}
          body{font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.65;color:#1a1a1a;padding:18px 22px;word-break:break-word;background:#fff;}
          img{max-width:100%!important;height:auto!important;}a{color:#2563eb;}
          table{border-collapse:collapse;max-width:100%!important;}td,th{padding:4px 8px;word-break:break-word;}
          pre,code{font-family:monospace;font-size:12px;background:#f5f5f5;border-radius:4px;}
          pre{padding:10px;white-space:pre-wrap;}code{padding:1px 4px;}
          blockquote{border-left:3px solid #d1d5db;margin:8px 0;padding-left:14px;color:#6b7280;}
          hr{border:none;border-top:1px solid #e5e7eb;margin:12px 0;}
        </style></head><body>${e.html}</body></html>`);
        doc.close();
        const resize=()=>{ try{ const h=iframe.contentDocument.body.scrollHeight; iframe.style.height=Math.min(Math.max(h+36,120),15000)+'px'; }catch{} };
        iframe.onload=resize;
        setTimeout(resize,200);setTimeout(resize,800);setTimeout(resize,2500);
      }catch{}
    });
  }
}

function toggleMeta(el){ el.classList.toggle('open'); el.nextElementSibling.classList.toggle('open'); }
function setView(m){ viewMode=m; if(curEmail) renderDetail(curEmail); }

function dlAtt(i){
  const a=curEmail?.atts[i]; if(!a) return;
  let blob;
  try{ blob=a.enc==='base64'?new Blob([dB64b(a.data)],{type:a.mime||'application/octet-stream'}):new Blob([a.data],{type:a.mime||'text/plain'}); }
  catch{ blob=new Blob([a.data||''],{type:'application/octet-stream'}); }
  const url=URL.createObjectURL(blob);
  const el=document.createElement('a');el.href=url;el.download=a.name||'attachment';
  document.body.appendChild(el);el.click();document.body.removeChild(el);
  setTimeout(()=>URL.revokeObjectURL(url),3000);
  toast(`Downloading "${a.name}"`);
}

function attIcon(mime){
  if(mime.includes('pdf'))    return{svg:`<svg width="14" height="14" viewBox="0 0 24 24" fill="#dc2626"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>`,bg:'#fee2e2'};
  if(mime.includes('image'))  return{svg:`<svg width="14" height="14" viewBox="0 0 24 24" fill="#7c3aed"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2z"/></svg>`,bg:'#ede9fe'};
  if(mime.includes('word'))   return{svg:`<svg width="14" height="14" viewBox="0 0 24 24" fill="#2563eb"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6z"/></svg>`,bg:'#dbeafe'};
  if(mime.includes('sheet')||mime.includes('excel')||mime.includes('csv')) return{svg:`<svg width="14" height="14" viewBox="0 0 24 24" fill="#16a34a"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6z"/></svg>`,bg:'#dcfce7'};
  return{svg:`<svg width="14" height="14" viewBox="0 0 24 24" fill="#6b7280"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6z"/></svg>`,bg:'#f3f4f6'};
}

function clearDetail(){ curEmail=null; document.getElementById('dp').innerHTML=`<div id="email-body" style="padding:0"><div class="detail-empty"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg><h3>Select an email</h3><p>Click any email in the list to read it</p></div></div>`; }

function toast(msg,type=''){ const t=document.getElementById('toast'); t.textContent=msg; t.className='show'+(type?' '+type:''); clearTimeout(_tt); _tt=setTimeout(()=>t.className='',4500); }

// ═══════════════════════════════════
// DRAG & DROP
// ═══════════════════════════════════
let dc=0;
document.body.addEventListener('dragenter',e=>{e.preventDefault();dc++;document.getElementById('drop-ov').classList.add('show');});
document.body.addEventListener('dragleave',e=>{e.preventDefault();dc--;if(dc<=0){dc=0;document.getElementById('drop-ov').classList.remove('show');}});
document.body.addEventListener('dragover',e=>e.preventDefault());
document.body.addEventListener('drop',async e=>{
  e.preventDefault();dc=0;document.getElementById('drop-ov').classList.remove('show');
  if(accounts.length>=MAX_ACCTS){toast('Max accounts reached','warn');return;}
  const files=[];
  async function re(entry,path){ if(entry.isFile){ await new Promise(res=>entry.file(f=>{try{Object.defineProperty(f,'webkitRelativePath',{value:path+f.name,writable:false,configurable:true});}catch{}files.push(f);res();})); }else if(entry.isDirectory){ const reader=entry.createReader();let all=[]; await new Promise(res=>{function rb(){reader.readEntries(async ents=>{if(!ents.length){res();}else{all=all.concat(Array.from(ents));rb();}});}rb();}); for(const en of all) await re(en,path+entry.name+'/'); } }
  for(const item of Array.from(e.dataTransfer.items)){const en=item.webkitGetAsEntry();if(en) await re(en,'');}
  if(files.length) await loadAccount(files);
});

// ═══════════════════════════════════
// BOOT
// ═══════════════════════════════════
(async()=>{
  try{
    await openDB();
    await loadCfg();
    buildSidebar(); updateStats();
    if(accounts.length){ scope={type:'acct',acctId:accounts[0].id}; buildSidebar(); await refreshList(); }
  }catch(err){ toast('DB error: '+err.message,'err'); console.error(err); }
})();
</script>
